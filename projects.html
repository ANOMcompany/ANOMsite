<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANOMcompany | Projects</title>
    <style>
        body { background-color: #080808; color: #e0e0e0; font-family: monospace; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-btn { color: #ff0000; text-decoration: none; border: 1px solid #600; padding: 5px 10px; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .back-btn:hover { background: #ff0000; color: #000; }
        .tool-card { border: 1px solid #600; background: #000; padding: 20px; margin-top: 20px; box-shadow: 0 0 15px rgba(255,0,0,0.1); }
        h1 { color: #ff0000; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        textarea { width: 100%; height: 100px; background: #050505; color: #0f0; border: 1px solid #444; padding: 10px; margin: 15px 0; font-family: monospace; box-sizing: border-box; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; background: #400; color: #fff; border: 1px solid #f00; padding: 12px; cursor: pointer; font-family: monospace; font-weight: bold; }
        button:hover { background: #f00; color: #000; }
        #result { margin-top: 20px; padding: 15px; background: #050505; border-left: 4px solid #f00; min-height: 40px; word-break: break-all; color: #0f0; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">< BACK_TO_DASHBOARD</a>
        <h1>[ LABORATORY_PROJECTS ]</h1>
        
        <div class="tool-card">
            <h3 style="color: #ff0000; margin: 0;">ANOM_CIPHER_V1.0</h3>
            <p style="font-size: 0.8em; color: #666;">> Base64 Encryption/Decryption Suite</p>
            <textarea id="anomIn" placeholder="Veriyi buraya girin..."></textarea>
            <div class="btn-group">
                <button onclick="anomProc('enc')">ENCODE</button>
                <button onclick="anomProc('dec')">DECODE</button>
            </div>
            <div id="result">[ WAITING_FOR_DATA ]</div>
        </div>
    </div>

    <script>
        function anomProc(mode) {
            const input = document.getElementById('anomIn').value;
            const res = document.getElementById('result');
            if(!input) return;
            try {
                res.innerText = (mode === 'enc') ? btoa(input) : atob(input);
            } catch(e) { res.innerText = "[!] ERROR: INVALID_FORMAT"; }
        }
    </script>
</body>
</html>
